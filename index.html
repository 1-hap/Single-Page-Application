<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Analyzer</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <h1>Password Analyzer</h1>

    <!-- User inputs password -->
     <div class="input">
    <label for="password">Enter password:</label>
    <div class="input-wrapper">
        <input type="password" id="password" placeholder="Type your password here...">
        <button id="toggle-btn" type="button">Show</button>
    </div>
</div>

     <!-- Measures the password stregnth -->
      <div class="strength">
        <p>Strength:</p>
        <div class="bar">
            <div id="strength-fill"></div>
        </div>
        <p id="strength-text">None</p>
      </div>


      <!-- Score --> 
       <div class="score"> 
        <p>Score: <span id="score">0</span></p> 
       </div>

      <!-- Password crack time -->
       <div class="est-crack-time">
        <p>Estimated crack time: <span id="crack-time">N/A</span></p>
       </div>

       <!-- Feedback for user -->
        <div class="feeback">
            <h3>Feedback</h3>
            <ul id="feedback-list">
                <li>No analysis yet</li>
            </ul>
        </div>

        <!-- NEW: Config file upload -->
        <div class="config-upload">
            <label for="config-upload">Load config (optional):</label>
            <input type="file" id="config-upload" accept=".json">
        </div>

        <!-- NEW: Download result button -->
        <div class="download">
            <button id="download-btn" type="button">Download result as JSON</button>
        </div>

        </div>

        <script src="script.js"></script>

</body>
</html>
